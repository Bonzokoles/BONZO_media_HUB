# SonarCloud Configuration for BONZO_media_HUB (Next.js)
sonar.projectKey=Bonzokoles_BONZO_media_HUB
sonar.organization=bonzokoles

# Source code location
sonar.sources=app,components,lib,hooks,db

# Exclude patterns
sonar.exclusions=**/node_modules/**,**/dist/**,.next/**,**/coverage/**,**/installers/**

# TypeScript configuration
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Test coverage
sonar.coverage.exclusions=**/*.test.ts,**/*.spec.ts,**/node_modules/**

# Code quality gates
sonar.qualitygate.wait=true

# Maximum allowed issues
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=*
sonar.issue.ignore.multicriteria.e1.resourceKey=**/node_modules/**