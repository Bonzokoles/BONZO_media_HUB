pull_request_rules:
  - name: Dependabot auto-merge
    conditions:
      - author = dependabot[bot]
      - check-success = continuous-integration/travis-ci/pr
      - "#approved-reviews-by >= 0"
    actions:
      merge:
        method: squash
        commit_message: "{{ title }} ({{ number }})"
      delete_head_branch: {}

  - name: Auto-merge approved PRs with passing checks
    conditions:
      - "#approved-reviews-by >= 1"
      - status-success = Code Quality & Security Checks
      - "#changes-requested-reviews-by == 0"
      - -draft
    actions:
      merge:
        method: squash
        commit_message: "{{ title }} ({{ number }})"

  - name: Large PR notification
    conditions:
      - "files > 15"
    actions:
      label:
        add:
          - large-pr

  - name: Quality gate labels
    conditions:
      - status-success = Code Quality & Security Checks
    actions:
      label:
        add:
          - quality-gate-passed